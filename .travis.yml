language: python

# Needed for Python 3.7
dist: bionic

python:
    - 3.6.11
    - 3.7.8
    - 3.8.5
# moto is incompatible with 3.5 because it relies on the key order of its url path regex rules
#    - 3.5.9

install:
    ## Install project dependencies into cached venv
    ## https://docs.gitlab.com/ee/ci/caching/#caching-python-dependencies
    - python -V
    - pip install -U pip setuptools virtualenv
    - virtualenv venv
    - source venv/bin/activate
    - curl -sSL https://raw.githubusercontent.com/sdispater/poetry/master/get-poetry.py | python
    - source $HOME/.poetry/env
    - poetry run python -m pip install -r requirements.dev
    - poetry install -v --no-interaction --extras all
    - poetry show -t --no-dev

script:
    - source $HOME/.poetry/env
    - make mototest
after_success:
    codecov
deploy:
    provider: pypi
    distributions: "sdist bdist_wheel"
    user: aio-libs-bot
    password:
        secure: 
    on:
        tags: true
        repo: aio-libs/aiobotocore
        all_branches: true
        python: 3.7
        skip_existing: true

cache: pip

# tags are considered branches, so we need a regex to allow for them
# https://docs.travis-ci.com/user/customizing-the-build#safelisting-or-blocklisting-branches
branches:
  only:
  - master
  - /^\d+\.\d+\.\d+$/
